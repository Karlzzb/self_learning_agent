<body>
<h1>梯度下降:沿坡向下找最低点</h1>
<p class="subtitle">理解模型如何一步步减小误差</p>

<h2>知识:误差面与步长</h2>
<p>梯度下降把训练看成在「误差面」上往低处走:每一步沿误差下降最快的方向移动一小段,步长由学习率控制。</p>
<p>学习率太大会越过最低点,太小会走得很慢——这是个需要权衡的旋钮。</p>

<aside class="primary-source" data-primary-source>
<strong>Primary source:</strong>
<a href="https://www.deeplearningbook.org">Book: Deep Learning — Goodfellow, Bengio &amp; Courville</a>
</aside>

<section class="quiz" data-quiz>
<p><strong>学习率过大可能造成什么后果?</strong></p>
<button type="button" class="quiz-option" data-quiz-option data-correct>越过最低点来回震荡</button>
<button type="button" class="quiz-option" data-quiz-option>训练立刻彻底停止</button>
<button type="button" class="quiz-option" data-quiz-option>权重永远保持不变</button>
<p class="quiz-feedback" aria-live="polite"></p>
</section>

<hr>
<section class="citations">
<h2>References</h2>

<script>
document.querySelectorAll('[data-quiz]').forEach(function (quiz) {
  var feedback = quiz.querySelector('.quiz-feedback');
  quiz.querySelectorAll('[data-quiz-option]').forEach(function (option) {
    option.addEventListener('click', function () {
      var correct = option.getAttribute('data-correct') !== null;
      option.classList.add(correct ? 'is-correct' : 'is-wrong');
      if (feedback) { feedback.textContent = correct ? '\u2713 Correct.' : '\u2717 Not quite.'; }
    });
  });
});
</script>
</body>
